server:
  port: 8080

spring:
  application:
    name: aily-pec

  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://123.207.199.246:3306/ailypec?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: aily3306
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

# 番茄钟配置
pomodoro:
  default-config:
    work-duration: 25
    break-duration: 5
    auto-start: false
  workday-config:
    work-duration: 50
    break-duration: 10
    auto-start: true
  work-time:
    start-hour: 9
    end-hour: 18
    enabled: true

# 日志配置
logging:
  level:
    com.ailypec: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
