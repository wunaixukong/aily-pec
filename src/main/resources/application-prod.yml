server:
  port: ${SERVER_PORT:8080}

spring:
  # 生产环境数据库配置
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/ailypec?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  # 生产环境 Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:sk-c0cUNVWJt7VQsj6F6IX7Hf6I2WFG8SjBvOXmLWRxz0HJu5pq}

app:
  ai:
    workout:
      enabled: ${WORKOUT_AI_ENABLED:true}
      base-url: ${WORKOUT_AI_BASE_URL:https://ruoli.dev}
      chat-path: ${WORKOUT_AI_CHAT_PATH:/v1/messages}
      model: ${WORKOUT_AI_MODEL:claude-haiku-4-5-20251001}

logging:
  level:
    com.ailypec: INFO
    org.springframework.web: WARN
  file:
    name: logs/ailypec.log
