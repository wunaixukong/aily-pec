server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/ailypec?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST:123.207.199.246}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  ai:
    openai:
      api-key: ${AI_API_KEY:}

app:
  today-workout-chat:
    flush-interval-ms: ${TODAY_WORKOUT_CHAT_FLUSH_INTERVAL_MS:30000}
  ai:
    workout:
      enabled: ${WORKOUT_AI_ENABLED:true}
      routing:
        failure-cooldown-seconds: ${WORKOUT_AI_FAILURE_COOLDOWN_SECONDS:120}
      routes:
        # 主路由使用的 cc
        - name: relay-primary
          api-type: anthropic
          base-url: ${WORKOUT_AI_ROUTE_1_BASE_URL:https://ruoli.dev}
          chat-path: ${WORKOUT_AI_ROUTE_1_CHAT_PATH:/v1/messages}
          model: ${WORKOUT_AI_ROUTE_1_MODEL:claude-haiku-4-5-20251001}
          api-key: ${WORKOUT_AI_ROUTE_1_API_KEY:sk-c0cUNVWJt7VQsj6F6IX7Hf6I2WFG8SjBvOXmLWRxz0HJu5pq}
        - name: codex-relay
          api-type: openai
          base-url: ${WORKOUT_AI_ROUTE_2_BASE_URL:https://ruoli.dev/v1}
          chat-path: ${WORKOUT_AI_ROUTE_2_CHAT_PATH:/chat/completions}
          model: ${WORKOUT_AI_ROUTE_2_MODEL:gpt-5.4}
          api-key: ${WORKOUT_AI_ROUTE_2_API_KEY:sk-dyNIdlzLCI2plTvXzuV7yf8X4nnCPUuxJRK2ZdpGuP2A0rY4}
        - name: deepseek-fallback
          api-type: openai
          base-url: ${WORKOUT_AI_ROUTE_3_BASE_URL:https://api.deepseek.com}
          chat-path: ${WORKOUT_AI_ROUTE_3_CHAT_PATH:/chat/completions}
          model: ${WORKOUT_AI_ROUTE_3_MODEL:deepseek-chat}
          api-key: ${WORKOUT_AI_ROUTE_3_API_KEY:sk-d29f758bf414483591ba65eb40a02405}

logging:
  level:
    com.ailypec: INFO
    org.springframework.web: WARN
  file:
    name: logs/ailypec.log
