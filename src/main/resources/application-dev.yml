server:
  port: 8080

spring:
  # 开发环境数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/ailypec_dev
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # 开发环境 Redis
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.ailypec: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
