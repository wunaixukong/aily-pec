server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ailypec_dev
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:123.207.199.246}
      port: 6379

  ai:
    openai:
      api-key: ${AI_API_KEY:}

app:
  today-workout-chat:
    flush-interval-ms: ${TODAY_WORKOUT_CHAT_FLUSH_INTERVAL_MS:30000}
  ai:
    workout:
      enabled: true
      routing:
        failure-cooldown-seconds: 90
      routes:
        - name: relay-primary
          api-type: anthropic
          base-url: ${WORKOUT_AI_ROUTE_1_BASE_URL:https://ruoli.dev}
          chat-path: ${WORKOUT_AI_ROUTE_1_CHAT_PATH:/v1/messages}
          model: ${WORKOUT_AI_ROUTE_1_MODEL:claude-haiku-4-5-20251001}
        - name: codex-relay
          api-type: openai
          base-url: ${WORKOUT_AI_ROUTE_2_BASE_URL:https://ruoli.dev/v1}
          chat-path: ${WORKOUT_AI_ROUTE_2_CHAT_PATH:/chat/completions}
          model: ${WORKOUT_AI_ROUTE_2_MODEL:gpt-5.4}
        - name: deepseek-fallback
          api-type: openai
          base-url: ${WORKOUT_AI_ROUTE_3_BASE_URL:https://api.deepseek.com}
          chat-path: ${WORKOUT_AI_ROUTE_3_CHAT_PATH:/chat/completions}
          model: ${WORKOUT_AI_ROUTE_3_MODEL:deepseek-chat}
          api-key: ${WORKOUT_AI_ROUTE_3_API_KEY:}

logging:
  level:
    com.ailypec: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
