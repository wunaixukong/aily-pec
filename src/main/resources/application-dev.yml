server:
  port: 8080

spring:
  # 开发环境数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/ailypec_dev
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # 开发环境 Redis
  data:
    redis:
      host: localhost
      port: 6379

  # AI 训练推荐配置 (中转服务)
  ai:
    openai:
      api-key: sk-c0cUNVWJt7VQsj6F6IX7Hf6I2WFG8SjBvOXmLWRxz0HJu5pq

app:
  ai:
    workout:
      base-url: https://ruoli.dev
      chat-path: /v1/chat/completions
      model: claude-haiku-4-5-20251001
      enabled: true

logging:
  level:
    com.ailypec: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
